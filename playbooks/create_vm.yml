- name: Create and start VM on Proxmox
  hosts: proxmox
  gather_facts: no

  vars_files:
    - "../inventories/{{ env }}/group_vars/vault.yml"
    - "../inventories/{{ env }}/group_vars/all.yml"

  tasks:

    - name: Install pip
      ansible.builtin.package:
        name:
          - python3-pip
          - python3-proxmoxer
        state: present

    - name: Create VM
      community.general.proxmox_kvm:
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_api_password }}"
        api_host: "{{ proxmox_api_host }}"
        node: "{{ proxmox_node }}"
        vmid: "{{ vm_id }}"
        name: "{{ vm_name }}"
        memory: "{{ memory }}"
        cores: "{{ cores }}"
        sockets: "{{ sockets }}"
        scsihw: virtio-scsi-pci
        scsi:
          scsi0: "{{ storage }}:{{ disk_size }}"
        ide:
          ide2: "{{ iso }},media=cdrom"
        boot: "order=ide2"
        net:
          net0: virtio,bridge=vmbr0
        state: present

    - name: Start VM
      community.general.proxmox_kvm:
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_api_password }}"
        api_host: "{{ proxmox_api_host }}"
        vmid: "{{ vm_id }}"
        state: started
